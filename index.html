<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCC — Intranet Consortium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;1,400&family=Karla:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --sb: #0c1824;
  --sb-hover: #162336;
  --sb-active: #1b3050;
  --sb-border: #1a2f44;
  --accent: #c4a35a;
  --accent-dim: #7a6435;
  --bg: #f4f2ec;
  --white: #fdfcf9;
  --text: #1c1c1c;
  --muted: #5a5a5a;
  --border: #dedad2;
  --sb-text: #bab6ad;
  --sb-group: #527090;
  --s-anticipe: #6a8caa;
  --s-encours: #3d7cc9;
  --s-areviser: #d07010;
  --s-stabilise: #2e8f5a;
  --s-verrouille: #b03020;
  --s-archive: #888;
  --col-admin: #d07010;
  --col-partage: #2e8f5a;
}

html,body{height:100%;overflow:hidden;font-family:'Karla',sans-serif;background:var(--bg);color:var(--text)}

/* AUTH */
#auth {
  position:fixed;inset:0;background:var(--sb);
  display:flex;align-items:center;justify-content:center;z-index:999;
  flex-direction:column;gap:0;
}
.auth-card {
  background:#0f1f31;border:1px solid var(--sb-border);
  border-top:3px solid var(--accent);padding:2.75rem 2.5rem;
  width:360px;border-radius:3px;
}
.auth-brand {
  font-family:'Spectral',serif;font-size:1rem;color:var(--accent);
  letter-spacing:.18em;text-transform:uppercase;margin-bottom:.25rem;
}
.auth-sub {
  font-size:.68rem;color:var(--sb-group);letter-spacing:.1em;
  text-transform:uppercase;margin-bottom:2.25rem;line-height:1.5;
}
.auth-label {
  display:block;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--sb-group);margin-bottom:.45rem;
}
.auth-input {
  width:100%;background:#162336;border:1px solid var(--sb-border);
  color:#e4e0d6;padding:.7rem .9rem;font-family:'Karla',sans-serif;
  font-size:.9rem;border-radius:2px;outline:none;transition:border-color .2s;
}
.auth-input:focus{border-color:var(--accent-dim)}
.auth-btn {
  width:100%;margin-top:1.25rem;background:var(--accent);color:#0c1824;
  border:none;padding:.8rem;font-family:'Karla',sans-serif;font-size:.78rem;
  font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;
  border-radius:2px;transition:background .2s;
}
.auth-btn:hover{background:#d4b570}
.auth-error{color:#b03020;font-size:.75rem;margin-top:.6rem;text-align:center;min-height:1.1em}

/* APP LAYOUT */
#app{display:none;height:100vh;flex-direction:column}
#app.on{display:flex}

/* TOPBAR */
.topbar {
  height:48px;background:var(--sb);display:flex;align-items:center;
  justify-content:space-between;padding:0 1.25rem;flex-shrink:0;
  border-bottom:1px solid var(--sb-border);
  transition:border-color .2s;
}
.topbar.admin-mode {
  border-bottom:2px solid rgba(196,163,90,.45);
  background:#0e1d2c;
}
.topbar-brand{
  display:flex;align-items:baseline;gap:.75rem;
}
.topbar-title{
  font-family:'Spectral',serif;font-size:.95rem;color:var(--accent);
  letter-spacing:.08em;
}
.topbar-date{
  font-size:.65rem;color:var(--sb-group);letter-spacing:.06em;
}
.topbar-right{display:flex;align-items:center;gap:.75rem}
.mode-badge {
  font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;
  padding:.22rem .65rem;border-radius:2px;font-weight:500;
}
.mode-badge.admin{background:rgba(208,112,16,.12);color:var(--col-admin);border:1px solid rgba(208,112,16,.25)}
.mode-badge.partage{background:rgba(46,143,90,.12);color:var(--col-partage);border:1px solid rgba(46,143,90,.25)}
.topbar-logout {
  background:none;border:1px solid var(--sb-border);color:var(--sb-group);
  font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;
  padding:.22rem .65rem;cursor:pointer;border-radius:2px;
  transition:all .15s;font-family:'Karla',sans-serif;
}
.topbar-logout:hover{border-color:var(--accent-dim);color:var(--sb-text)}

/* BODY */
.app-body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar {
  width:272px;background:var(--sb);overflow-y:auto;flex-shrink:0;
  border-right:1px solid var(--sb-border);padding:.75rem 0 1rem;
}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--sb-border);border-radius:2px}

.nav-group{margin-bottom:.15rem}
.nav-group-label {
  font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--sb-group);padding:.55rem 1.1rem .25rem;
  display:flex;align-items:center;gap:.4rem;
}
.nav-group-label.p0-group{color:rgba(208,112,16,.55)}
.p0-pip{width:5px;height:5px;background:var(--col-admin);border-radius:50%;opacity:.65;flex-shrink:0}

.nav-item {
  display:flex;align-items:flex-start;gap:.5rem;
  padding:.35rem 1.1rem .35rem 1.1rem;
  cursor:pointer;transition:background .12s;position:relative;
}
.nav-item:hover{background:var(--sb-hover)}
.nav-item.active{background:var(--sb-active);border-left:2px solid var(--accent);padding-left:calc(1.1rem - 2px)}
.nav-item.locked{opacity:.35;cursor:not-allowed}
.nav-item.locked:hover{background:transparent}

.nav-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:.55rem}
.nav-dot.anticipe{background:var(--s-anticipe)}
.nav-dot.en-cours{background:var(--s-encours)}
.nav-dot.a-reviser{background:var(--s-areviser)}
.nav-dot.stabilise{background:var(--s-stabilise)}
.nav-dot.verrouille{background:var(--s-verrouille)}
.nav-dot.archive{background:var(--s-archive)}

.nav-body{flex:1;min-width:0}
.nav-id{
  font-size:.65rem;font-weight:500;letter-spacing:.06em;
  color:var(--accent);opacity:.8;margin-bottom:.1rem;
}
.nav-item.active .nav-id{opacity:1;color:var(--accent)}
.nav-item.empty-module .nav-id{opacity:.4}

.nav-label{font-size:.74rem;color:var(--sb-text);line-height:1.3;flex:1}
.nav-item.active .nav-label{color:#fff}
.nav-item.empty-module .nav-label{color:#455a6a;font-style:italic}

.nav-tags{display:flex;align-items:center;gap:.3rem;flex-shrink:0;margin-top:.15rem}
.tag-sc{
  font-size:.55rem;letter-spacing:.05em;color:var(--sb-group);
  background:#162336;padding:.1rem .3rem;border-radius:1px;flex-shrink:0;
}
.tag-star{font-size:.65rem;color:var(--accent);opacity:.7;flex-shrink:0}
.tag-lock{font-size:.6rem;color:var(--s-verrouille);opacity:.5;flex-shrink:0;line-height:1}
.tag-empty{
  font-size:.55rem;letter-spacing:.04em;color:#2e4a60;
  border:1px solid #1e3448;padding:.1rem .3rem;border-radius:1px;flex-shrink:0;
}

.nav-empty{
  font-size:.68rem;color:#2e4050;font-style:italic;
  padding:.3rem 1.3rem;
}

/* LEGEND */
.sidebar-legend {
  margin-top:1.5rem;padding:.8rem 1.1rem .4rem;
  border-top:1px solid #162336;
}
.legend-title{
  font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;
  color:#2e4050;margin-bottom:.45rem;
}
.legend-row{display:flex;align-items:center;gap:.45rem;font-size:.62rem;color:#374a5a;margin-bottom:.2rem}

/* CONTENT */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.content-empty {
  flex:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:.75rem;
}
.empty-title{
  font-family:'Spectral',serif;font-style:italic;font-size:1.4rem;color:#bbb;
}
.empty-sub{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:#ccc}
.module-frame {
  flex:1;border:none;width:100%;height:100%;display:none;background:var(--white);
}
.module-frame.on{display:block}

/* BREADCRUMB */
.breadcrumb {
  height:36px;background:var(--white);border-bottom:1px solid var(--border);
  display:none;align-items:center;padding:0 1.5rem;gap:.5rem;flex-shrink:0;
}
.breadcrumb.on{display:flex}
.bc-group{font-size:.7rem;color:var(--muted)}
.bc-sep{font-size:.7rem;color:var(--border)}
.bc-module{font-size:.7rem;color:var(--text);font-weight:500}
.bc-status{
  font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;
  padding:.15rem .5rem;border-radius:2px;margin-left:.25rem;
}
.bc-status.anticipe{background:#e8f0f8;color:#4a6a8a}
.bc-status.en-cours{background:#e6f0fa;color:#2a6aaa}
.bc-status.a-reviser{background:#fdf0e0;color:#a05808}
.bc-status.stabilise{background:#e6f5ec;color:#1f7040}
.bc-status.verrouille{background:#fceae8;color:#902018}
.bc-status.archive{background:#f0f0f0;color:#666}
</style>
</head>
<body>

<div id="auth">
  <div class="auth-card">
    <div class="auth-brand">Ma Classe au Cinéma</div>
    <div class="auth-sub">Marché public d'éducation à l'image<br>Intranet de réponse — Consortium FACC</div>
    <label class="auth-label" for="pwd">Code d'accès</label>
    <input class="auth-input" id="pwd" type="password" autocomplete="off" placeholder="···">
    <button class="auth-btn" onclick="auth()">Entrer</button>
    <div class="auth-error" id="auth-err"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-brand">
      <span class="topbar-title">MCC · Intranet Consortium</span>
      <span class="topbar-date" id="topbar-date"></span>
    </div>
    <div class="topbar-right">
      <span class="mode-badge" id="mode-badge"></span>
      <button class="topbar-logout" onclick="logout()">Déconnexion</button>
    </div>
  </div>
  <div class="app-body">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="content">
      <div class="breadcrumb" id="breadcrumb">
        <span class="bc-group" id="bc-group"></span>
        <span class="bc-sep">›</span>
        <span class="bc-module" id="bc-module"></span>
        <span class="bc-status" id="bc-status"></span>
      </div>
      <div class="content-empty" id="content-empty">
        <div class="empty-title">Sélectionner un module</div>
        <div class="empty-sub">Marché public · Éducation à l'image</div>
      </div>
      <iframe class="module-frame" id="frame" src="about:blank"></iframe>
    </div>
  </div>
</div>

<script>
let MODE = null;
let ACTIVE = null;
let CFG = null;

const PASSWORDS = {
  admin: 'mcc-admin-2025',
  partage: 'mcc-consortium-2025'
};

const STATUS_CLASS = {
  'anticipé': 'anticipe',
  'en cours': 'en-cours',
  'à réviser': 'a-reviser',
  'stabilisé': 'stabilise',
  'verrouillé': 'verrouille',
  'archivé': 'archive'
};

const STATUS_LABEL = {
  'anticipé': 'Anticipé',
  'en cours': 'En cours',
  'à réviser': 'À réviser',
  'stabilisé': 'Stabilisé',
  'verrouillé': 'Verrouillé',
  'archivé': 'Archivé'
};

function auth() {
  const v = document.getElementById('pwd').value;
  const err = document.getElementById('auth-err');
  if (v === PASSWORDS.admin) { MODE = 'admin'; launch(); }
  else if (v === PASSWORDS.partage) { MODE = 'partage'; launch(); }
  else { err.textContent = 'Code incorrect'; document.getElementById('pwd').value = ''; }
}

document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') auth(); });

function launch() {
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').classList.add('on');
  const b = document.getElementById('mode-badge');
  b.textContent = MODE === 'admin' ? 'Mode administrateur' : 'Mode consortium';
  b.className = 'mode-badge ' + MODE;
  if (MODE === 'admin') document.querySelector('.topbar').classList.add('admin-mode');
  const d = new Date();
  document.getElementById('topbar-date').textContent =
    d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
  loadConfig();
}

function logout() {
  MODE = null; ACTIVE = null;
  document.getElementById('app').classList.remove('on');
  document.getElementById('auth').style.display = 'flex';
  document.getElementById('pwd').value = '';
  document.getElementById('auth-err').textContent = '';
  document.getElementById('frame').className = 'module-frame';
  document.getElementById('frame').src = 'about:blank';
  document.getElementById('content-empty').style.display = 'flex';
  document.getElementById('breadcrumb').classList.remove('on');
}

function loadConfig() {
  fetch('config.json')
    .then(r => r.json())
    .then(cfg => { CFG = cfg; buildSidebar(); restoreLast(); })
    .catch(() => { console.error('config.json introuvable'); });
}

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';

  CFG.groups.forEach(g => {
    if (g.adminOnly && MODE !== 'admin') return;

    const groupEl = document.createElement('div');
    groupEl.className = 'nav-group';

    const label = document.createElement('div');
    label.className = 'nav-group-label' + (g.adminOnly ? ' p0-group' : '');
    label.innerHTML = g.adminOnly
      ? `<span class="p0-pip"></span>${g.label}`
      : g.label;
    groupEl.appendChild(label);

    if (!g.entries || g.entries.length === 0) {
      const emp = document.createElement('div');
      emp.className = 'nav-empty';
      emp.textContent = 'Aucune entrée pour le moment';
      groupEl.appendChild(emp);
    } else {
      g.entries.forEach(e => {
        const isLocked = e.locked || g.locked;
        const isFilled = e.filled === true;
        const sc = STATUS_CLASS[e.status] || 'anticipe';

        const item = document.createElement('div');
        item.className = 'nav-item'
          + (isLocked ? ' locked' : '')
          + (!isFilled && !isLocked ? ' empty-module' : '')
          + (ACTIVE === e.id ? ' active' : '');
        item.dataset.id = e.id;
        item.dataset.group = g.label;
        item.dataset.status = e.status;

        item.innerHTML = `
          <div class="nav-dot ${sc}"></div>
          <div class="nav-body">
            <div class="nav-id">${e.id}</div>
            <div class="nav-label">${e.label}</div>
          </div>
          <div class="nav-tags">
            ${e.strategic ? '<span class="tag-star">★</span>' : ''}
            ${e.scenarized ? '<span class="tag-sc">sc</span>' : ''}
            ${!isFilled && !isLocked ? '<span class="tag-empty">vide</span>' : ''}
            ${isLocked ? '<span class="tag-lock">⊘</span>' : ''}
          </div>`;

        if (!isLocked) {
          item.addEventListener('click', () => openModule(e, g.label));
        }
        groupEl.appendChild(item);
      });
    }

    sb.appendChild(groupEl);
  });

  buildLegend(sb);
}

function buildLegend(sb) {
  const legend = document.createElement('div');
  legend.className = 'sidebar-legend';
  const rows = [
    ['anticipe','anticipé'],['en-cours','en cours'],['a-reviser','à réviser'],
    ['stabilise','stabilisé'],['verrouille','verrouillé'],['archive','archivé']
  ];
  legend.innerHTML = `<div class="legend-title">Statuts des modules</div>` +
    rows.map(([cls, lbl]) =>
      `<div class="legend-row"><div class="nav-dot ${cls}" style="margin-top:0"></div><span>${lbl}</span></div>`
    ).join('');
  sb.appendChild(legend);
}

function openModule(entry, groupLabel) {
  ACTIVE = entry.id;
  localStorage.setItem('mcc_last', entry.id);

  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === entry.id);
  });

  const sc = STATUS_CLASS[entry.status] || 'anticipe';
  document.getElementById('bc-group').textContent = groupLabel;
  document.getElementById('bc-module').textContent = entry.label;
  const st = document.getElementById('bc-status');
  st.textContent = STATUS_LABEL[entry.status] || entry.status;
  st.className = 'bc-status ' + sc;
  document.getElementById('breadcrumb').classList.add('on');
  document.getElementById('content-empty').style.display = 'none';

  const frame = document.getElementById('frame');
  frame.src = `modules/${entry.id}.html`;
  frame.className = 'module-frame on';
}

document.getElementById('frame').addEventListener('load', function() {
  try {
    const doc = this.contentDocument;
    if (!doc || !doc.head) return;
    if (doc.getElementById('mcc-vars')) return;
    const s = doc.createElement('style');
    s.id = 'mcc-vars';
    s.textContent = `
      :root {
        --color-background-primary:#ffffff;
        --color-background-secondary:#f5f5f5;
        --color-background-tertiary:#eeeeee;
        --color-text-primary:#1a1a1a;
        --color-text-secondary:#555555;
        --color-text-tertiary:#888888;
        --color-border-tertiary:rgba(0,0,0,0.10);
        --color-border-secondary:rgba(0,0,0,0.22);
        --color-border-primary:rgba(0,0,0,0.35);
        --color-border-warning:#e5a800;
        --color-border-danger:#e08070;
        --color-border-info:#76a9fa;
        --font-sans:system-ui,-apple-system,sans-serif;
        --font-serif:Georgia,serif;
        --font-mono:'Courier New',monospace;
        --border-radius-md:8px;
        --border-radius-lg:12px;
        --border-radius-xl:16px;
        --color-background-info:#e6f0fb;
        --color-text-info:#1a5fa0;
        --color-background-success:#e6f5ec;
        --color-text-success:#1f7040;
        --color-background-warning:#fdf0e0;
        --color-text-warning:#a05808;
        --color-background-danger:#fceae8;
        --color-text-danger:#902018;
      }`;
    doc.head.appendChild(s);
  } catch(e) {}
});

function restoreLast() {
  const last = localStorage.getItem('mcc_last');
  if (!last || !CFG) return;
  for (const g of CFG.groups) {
    if (g.adminOnly && MODE !== 'admin') continue;
    const e = (g.entries || []).find(x => x.id === last && !x.locked && !g.locked);
    if (e) { openModule(e, g.label); return; }
  }
}
</script>
</body>
</html>
